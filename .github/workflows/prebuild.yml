name: Prebuild
on:
  workflow_dispatch:
jobs:
  prebuild:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            container: ubuntu:22.04
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            container: ubuntu:22.04
          - os: ubuntu-24.04
            platform: android
            arch: x64
          - os: ubuntu-24.04
            platform: android
            arch: ia32
          - os: ubuntu-24.04
            platform: android
            arch: arm64
          - os: ubuntu-24.04
            platform: android
            arch: arm
          - os: macos-14
            platform: darwin
            arch: x64
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: macos-14
            platform: ios
            arch: arm64
          - os: macos-14
            platform: ios
            arch: arm64
            tags: -simulator
            flags: --simulator
          - os: macos-14
            platform: ios
            arch: x64
            tags: -simulator
            flags: --simulator
          - os: windows-2022
            platform: win32
            arch: x64
          - os: windows-2022
            platform: win32
            arch: arm64
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    name: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}
    steps:
      - run: apt update && apt install -y git clang lld
        if: ${{ matrix.platform == 'linux' }}
      - uses: holepunchto/actions/node-base@current
      - uses: holepunchto/actions/compile-prebuilds@native-actions
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          flags: ${{ matrix.flags }}
      - uses: holepunchto/actions/upload-prebuilds@native-actions
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          tags: ${{ matrix.tags}}
  merge:
    runs-on: ubuntu-latest
    needs: prebuild
    steps:
      - uses: holepunchto/actions/merge-prebuilds@native-actions
